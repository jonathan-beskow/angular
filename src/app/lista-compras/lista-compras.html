<div class="container">
  <h1>Lista compras</h1>

  <form #frm="ngForm" class="add-item-form">
    <input
      type="text"
      name="item"
      id="item"
      [(ngModel)]="item"
      placeholder="Digite o nome do item"
    />
    <button type="button" (click)="adicionarItem()">Adicionar</button>
  </form>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Item</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (elemento of lista; track elemento.id) {
        <tr>
          <td>{{ elemento.id }}</td>
          <td>{{ elemento.nome }}</td>
          <td><input type="checkbox" checked="!{{ elemento.comprado }}" /></td>
        </tr>
      }
    </tbody>
  </table>
</div>
